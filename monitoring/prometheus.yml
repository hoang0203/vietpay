global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'clickhouse'
    static_configs:
      - targets: ['clickhouse:9363'] 

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']