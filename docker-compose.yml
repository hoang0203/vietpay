services:
  postgres:
    image: debezium/postgres:15-alpine
    container_name: postgres_source
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB_NAME}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    command: ["postgres", "-c", "wal_level=logical"]
    
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres_exporter
    ports:
      - "9187:9187"
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USERNAME}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB_NAME}?sslmode=disable"
    depends_on:
      - postgres
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    
    volumes:
      - ./data/zookeeper/data:/var/lib/zookeeper/data
      - ./data/zookeeper/log:/var/lib/zookeeper/log
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka_broker
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_MAP_INTERFACE_NAMES: "FALSE"
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    
    volumes:
      - ./data/kafka:/var/lib/kafka/data
  debezium:
    image: debezium/connect:2.4
    container_name: debezium_cdc
    ports:
      - "8083:8083"
    depends_on:
      - kafka
      - postgres
    environment:
      - BOOTSTRAP_SERVERS=kafka:29092
      - GROUP_ID=1
      - CONFIG_STORAGE_TOPIC=my_connect_configs
      - OFFSET_STORAGE_TOPIC=my_connect_offsets
      - STATUS_STORAGE_TOPIC=my_connect_status
      - CONFIG_STORAGE_REPLICATION_FACTOR=1
      - OFFSET_STORAGE_REPLICATION_FACTOR=1
      - STATUS_STORAGE_REPLICATION_FACTOR=1
  clickhouse:
    image: clickhouse/clickhouse-server:24.1
    container_name: clickhouse_warehouse
    ports:
      - "8123:8123"       
      - "9002:9000"
      - "9363:9363"    
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER} 
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD}
      - CLICKHOUSE_DB=${CLICKHOUSE_DB}
    depends_on:
      - minio
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ./data/clickhouse:/var/lib/clickhouse
      - ./monitoring/prometheus_config.xml:/etc/clickhouse-server/config.d/prometheus_config.xml
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
  spark-processor:
    build: .
    container_name: spark_streaming_app
    ports:
      - "4040:4040"
    depends_on:
      - kafka
      - debezium
    env_file:
      - .env
    environment:
      - DEBEZIUM_API_URL=http://debezium:8083/connectors
      - KAFKA_BOOTSTRAP_SERVER=kafka:29092
      - PYTHONUNBUFFERED=1
    volumes:
      - ./.env:/app/.env
      - ./register_connector.py:/app/register_connector.py
      - ./streaming.py:/app/streaming.py
      - ./create_topic.py:/app/create_topic.py
      - ./entrypoint.sh:/app/entrypoint.sh
      - ./email_worker.py:/app/email_worker.py
      - ./data/email:/app/data/email